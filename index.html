<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bodas de Ouro - José & Maria</title>

  <!-- Fontes elegantes -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --verde-escuro: #0a3622;
      --verde-medio: #198754;
      --dourado: linear-gradient(45deg, #a67c00, #d4af37, #b8860b, #d4af37, #a67c00);
      --sombra: 0 10px 30px rgba(0,0,0,0.3);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, #1e4d35 0%, #0a2417 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: var(--sombra);
      text-align: center;
      width: 90%;
      max-width: 380px;
      position: relative;
      border: 1px solid #eee;
    }

    /* Animação suave para transição entre páginas */
    .slide-fade {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
    }

    .slide-fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--verde-escuro);
      font-size: 22px;
      margin-bottom: 5px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .subtitulo {
      font-size: 10px;
      color: #666;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .nomes {
      font-family: 'Great Vibes', cursive;
      font-size: 34px;
      margin: 10px 0;
      background: var(--dourado);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
      white-space: normal; 
      overflow: visible;
      text-overflow: clip;
    }

    .nomes span {
      display: block;
      width: 100%;
    }

    .ampersand {
      font-size: 24px;
      margin: 5px 0;
      display: block;
    }

    .divisor {
      height: 1px;
      width: 50px;
      background: var(--dourado);
      margin: 10px auto;
    }

    input, select {
      padding: 14px;
      margin: 8px 0;
      font-size: 16px;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ddd;
      background-color: #f9f9f9;
    }

    button {
      margin-top: 15px;
      padding: 16px 30px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      background-color: var(--verde-medio);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.3s;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .hidden { display: none; }

    .mensagem-final {
      font-size: 17px;
      margin-top: 15px;
      color: var(--verde-escuro);
      line-height: 1.5;
    }

    .icon-celebration {
      font-size: 45px;
      margin-bottom: 10px;
      display: block;
      background: var(--dourado);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>

<body>

  <!-- Página 1 -->
  <div id="pagina1" class="card slide-fade slide-fade-in">
    <div class="subtitulo">COMEMORAMOS NOSSAS</div>
    <h1>Bodas de Ouro</h1>
    <div class="divisor"></div>
    
    <div class="nomes">
      <span>José Angelo</span>
      <span class="ampersand">&</span>
      <span>Maria Aparecida</span>
    </div>
    
    <div class="divisor"></div>
    <p style="color: #666; font-size: 0.85em; margin: 10px 0;">50 anos de amor e cumplicidade</p>
    <button onclick="irParaFormulario()">Confirmar Presença</button>
  </div>

  <!-- Página 2 -->
  <div id="pagina2" class="card hidden slide-fade">
    <h1>Confirmação</h1>
    <p style="color: #666; margin-bottom: 10px; font-size: 0.9em;">Será uma alegria ter você conosco!</p>
    <input type="text" placeholder="Seu nome completo" id="nome">
    <select id="quantidade">
      <option value="">Quantas pessoas?</option>
      <option value="1">Apenas eu (1)</option>
      <option value="2">2 pessoas</option>
      <option value="3">3 pessoas</option>
      <option value="4">4 pessoas</option>
      <option value="5">5 pessoas</option>
    </select>
    <button onclick="confirmar()" id="btnConfirmar">Confirmar Agora</button>
  </div>

  <!-- Página 3 -->
  <div id="pagina3" class="card hidden slide-fade">
    <span class="icon-celebration">⚭</span>
    <h1>Confirmado!</h1>
    <div class="mensagem-final" id="mensagemFinal"></div>
    <div class="divisor"></div>
    <p style="font-size: 11px; color: #999;">Obrigado por fazer parte da nossa história.</p>
  </div>

  <script>
    // URL do seu Google Apps Script (certifique-se que ela termina em /exec)
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbxG-OpIosWORD2_LUNb3zf_IX2uBiBzEyc0-JiWM2rKI-3GDm0sMuEf4JCYKKv32EKF/exec";

    function irParaFormulario() {
      // Inicia a transição de saída da página 1
      const p1 = document.getElementById("pagina1");
      p1.classList.remove("slide-fade-in");
      
      // Espera a animação de saída e troca de página
      setTimeout(() => {
        p1.classList.add("hidden");
        
        const p2 = document.getElementById("pagina2");
        p2.classList.remove("hidden");
        // Força o navegador a renderizar o elemento antes de iniciar a animação
        void p2.offsetWidth; 
        p2.classList.add("slide-fade-in");
      }, 500); 
    }

    function confirmar() {
      let nome = document.getElementById("nome").value;
      let qtd = document.getElementById("quantidade").value;
      let btn = document.getElementById("btnConfirmar");

      if (nome.trim() === "" || qtd === "") {
        alert("Por favor, preencha seu nome e a quantidade.");
        return;
      }

      // Feedback visual e bloqueio do botão
      btn.innerText = "Enviando...";
      btn.disabled = true;

      // Monta a URL completa para o envio via método GET
      const urlEnvio = `${URL_GOOGLE}?nome=${encodeURIComponent(nome)}&quantidade=${encodeURIComponent(qtd)}`;

      // Envia os dados para a planilha usando fetch e modo 'no-cors' para evitar erros de redirecionamento do GAS
      fetch(urlEnvio, {
        method: 'GET',
        mode: 'no-cors' // Essencial para evitar erros de CORS com o Google Apps Script
      })
      .then(() => {
        // Como o modo é 'no-cors', não podemos ler a resposta,
        // então assumimos que funcionou.
        
        // Inicia a transição de saída da página 2
        const p2 = document.getElementById("pagina2");
        p2.classList.remove("slide-fade-in");
        
        // Espera a animação de saída e troca de página
        setTimeout(() => {
          p2.classList.add("hidden");
          
          const p3 = document.getElementById("pagina3");
          p3.classList.remove("hidden");
          void p3.offsetWidth;
          p3.classList.add("slide-fade-in");

          // Atualiza a mensagem final
          document.getElementById("mensagemFinal").innerHTML =
            "<strong>" + nome + "</strong>, sua presença foi confirmada para <strong>" + qtd + " pessoa(s)</strong>.<br><br>Aguardamos você no dia 25 de JULHO!";
        }, 500);
      })
      .catch(err => {
        // Caso haja um erro real (como falta de internet)
        alert("Houve um erro ao enviar sua confirmação. Por favor, tente novamente.");
        btn.innerText = "Confirmar Agora";
        btn.disabled = false;
      });
    }
  </script>

</body>
</html>
