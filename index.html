<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bodas de Ouro - José & Maria</title>

  <!-- Fontes elegantes -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --verde-escuro: #0a3622;
      --verde-medio: #198754;
      --dourado: linear-gradient(45deg, #a67c00, #d4af37, #b8860b, #d4af37, #a67c00);
      --sombra: 0 10px 30px rgba(0,0,0,0.3);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, #1e4d35 0%, #0a2417 100%);
      height: 100vh;
      height: -webkit-fill-available; 
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 35px 25px;
      border-radius: 15px;
      box-shadow: var(--sombra);
      text-align: center;
      width: 90%;
      max-width: 400px;
      position: relative;
      transition: all 0.4s ease-in-out;
      border: 1px solid #eee;
    }

    .fade-in {
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--verde-escuro);
      font-size: 24px;
      margin-bottom: 5px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .subtitulo {
      font-size: 11px;
      color: #666;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    .nomes {
      font-family: 'Great Vibes', cursive;
      font-size: 36px;
      margin: 15px 0;
      background: var(--dourado);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
      /* Removido o nowrap para permitir a quebra */
      display: block; 
    }

    .nomes span {
      font-size: 28px; /* O "&" um pouco menor */
      display: block;
      margin: 5px 0;
    }

    .divisor {
      height: 1px;
      width: 50px;
      background: var(--dourado);
      margin: 10px auto;
    }

    input, select {
      padding: 14px;
      margin: 8px 0;
      font-size: 16px;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline-color: var(--verde-medio);
      background-color: #f9f9f9;
    }

    button {
      margin-top: 15px;
      padding: 16px 30px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      background-color: var(--verde-medio);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
    }

    .hidden {
      display: none;
    }

    .mensagem-final {
      font-size: 17px;
      margin-top: 15px;
      color: var(--verde-escuro);
      line-height: 1.5;
    }

    .icon-celebration {
      font-size: 45px;
      margin-bottom: 10px;
      display: block;
      background: var(--dourado);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @media (max-height: 650px) {
      .card { padding: 20px; }
      .nomes { font-size: 32px; margin: 10px 0; }
      h1 { font-size: 20px; }
    }
  </style>
</head>

<body>

  <!-- Página 1 -->
  <div id="pagina1" class="card fade-in">
    <div class="subtitulo">COMEMORAMOS NOSSAS</div>
    <h1>Bodas de Ouro</h1>
    <div class="divisor"></div>
    <div class="nomes">
      José Angelo 
      <span>&</span> 
      Maria Aparecida
    </div>
    <div class="divisor"></div>
    <p style="color: #666; font-size: 0.85em; margin: 15px 0;">50 anos de amor e cumplicidade</p>
    <button onclick="irParaFormulario()">Confirmar Presença</button>
  </div>

  <!-- Página 2 -->
  <div id="pagina2" class="card hidden">
    <h1>Confirmação</h1>
    <p style="color: #666; margin-bottom: 15px; font-size: 0.9em;">Será uma alegria ter você conosco!</p>
    <input type="text" placeholder="Seu nome completo" id="nome">
    <select id="quantidade">
      <option value="">Quantas pessoas?</option>
      <option value="1">Apenas eu (1)</option>
      <option value="2">2 pessoas</option>
      <option value="3">3 pessoas</option>
      <option value="4">4 pessoas</option>
      <option value="5">5 pessoas</option>
    </select>
    <button onclick="confirmar()">Confirmar Agora</button>
  </div>

  <!-- Página 3 -->
  <div id="pagina3" class="card hidden">
    <span class="icon-celebration">⚭</span>
    <h1>Confirmado!</h1>
    <div class="mensagem-final" id="mensagemFinal"></div>
    <div class="divisor"></div>
    <p style="font-size: 11px; color: #999;">Obrigado por fazer parte da nossa história.</p>
  </div>

  <script>
    function irParaFormulario() {
      const p1 = document.getElementById("pagina1");
      const p2 = document.getElementById("pagina2");
      p1.style.opacity = "0";
      setTimeout(() => {
        p1.classList.add("hidden");
        p2.classList.remove("hidden");
        p2.classList.add("fade-in");
      }, 300);
    }

    function confirmar() {
      let nome = document.getElementById("nome").value;
      let qtd = document.getElementById("quantidade").value;

      if (nome.trim() === "" || qtd === "") {
        alert("Por favor, preencha seu nome e a quantidade.");
        return;
      }

      const p2 = document.getElementById("pagina2");
      const p3 = document.getElementById("pagina3");

      p2.style.opacity = "0";
      setTimeout(() => {
        p2.classList.add("hidden");
        p3.classList.remove("hidden");
        p3.classList.add("fade-in");
        document.getElementById("mensagemFinal").innerHTML =
          "<strong>" + nome + "</strong>, sua presença foi confirmada para <strong>" + qtd + " pessoa(s)</strong>.<br><br>Aguardamos você no dia 25 de JULHO!";
      }, 300);
    }
  </script>

</body>
</html>
