<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bodas de Ouro - José & Maria</title>

  <!-- Fontes elegantes -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --verde-escuro: #0a3622;
      --verde-medio: #198754;
      /* Dourado ajustado para tons mais escuros e ricos */
      --dourado: linear-gradient(45deg, #a67c00, #d4af37, #b8860b, #d4af37, #a67c00);
      --sombra: 0 15px 35px rgba(0,0,0,0.3);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, #1e4d35 0%, #0a2417 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Detalhe de borda dourada sutil no fundo */
    body::before {
      content: "";
      position: absolute;
      top: 20px; bottom: 20px; left: 20px; right: 20px;
      border: 1px solid rgba(212, 175, 55, 0.15);
      pointer-events: none;
    }

    .card {
      background: white;
      padding: 50px 40px;
      border-radius: 15px;
      box-shadow: var(--sombra);
      text-align: center;
      width: 450px;
      max-width: 90%;
      position: relative;
      transition: all 0.5s ease;
      border: 1px solid #eee;
    }

    /* Efeito de transição suave */
    .fade-in {
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--verde-escuro);
      font-size: 28px;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitulo {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
      letter-spacing: 3px;
    }

    .nomes {
      font-family: 'Great Vibes', cursive;
      font-size: 38px;
      margin: 25px 0;
      background: var(--dourado);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
      white-space: nowrap;
    }

    .divisor {
      height: 2px;
      width: 60px;
      background: var(--dourado);
      margin: 20px auto;
    }

    input, select {
      padding: 12px;
      margin: 10px 0;
      font-size: 15px;
      width: 100%;
      border-radius: 5px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      outline-color: var(--verde-medio);
    }

    button {
      margin-top: 20px;
      padding: 15px 35px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      background-color: var(--verde-medio);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(25, 135, 84, 0.3);
    }

    button:hover {
      background-color: var(--verde-escuro);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(25, 135, 84, 0.4);
    }

    .hidden {
      display: none;
    }

    .mensagem-final {
      font-size: 18px;
      margin-top: 20px;
      color: var(--verde-escuro);
      line-height: 1.6;
      font-style: italic;
    }

    /* Estilização para o ícone de alianças ou flor */
    .icon-celebration {
      font-size: 50px; /* Aumentei um pouco o tamanho */
      margin-bottom: 10px;
      display: block;
      /* Aplica o degradê dourado ao símbolo */
      background: var(--dourado);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>

<body>

  <!-- Página 1 -->
  <div id="pagina1" class="card fade-in">
    <div class="subtitulo">COMEMORAMOS NOSSAS</div>
    <h1>Bodas de Ouro</h1>
    
    <div class="divisor"></div>

    <div class="nomes">
      José Angelo & Maria Aparecida
    </div>

    <div class="divisor"></div>

    <p style="color: #666; font-size: 0.9em; margin-top: 25px;">50 anos de Amor e Cumplicidade</p>

    <button onclick="irParaFormulario()">Confirmar Presença</button>
  </div>

  <!-- Página 2 -->
  <div id="pagina2" class="card hidden">
    <h1>Confirmação</h1>
    <p style="color: #666; margin-bottom: 20px;">Será uma alegria ter você conosco!</p>

    <input type="text" placeholder="Seu nome completo" id="nome">

    <select id="quantidade">
      <option value="">Quantas pessoas estarão presentes?</option>
      <option value="1">Apenas eu (1)</option>
      <option value="2">2 pessoas</option>
      <option value="3">3 pessoas</option>
      <option value="4">4 pessoas</option>
      <option value="5">5 pessoas</option>
    </select>

    <button onclick="confirmar()">Confirmar Agora</button>
  </div>

  <!-- Página 3 -->
  <div id="pagina3" class="card hidden">
    <!-- Ícone de Alianças Entrelaçadas com degradê dourado -->
    <span class="icon-celebration">⚭</span>
    <h1>Confirmado!</h1>

    <div class="mensagem-final" id="mensagemFinal"></div>
    
    <div class="divisor"></div>
    <p style="font-size: 12px; color: #999;">Obrigado por fazer parte da nossa história.</p>
  </div>

  <script>
    function irParaFormulario() {
      const p1 = document.getElementById("pagina1");
      const p2 = document.getElementById("pagina2");
      
      p1.style.opacity = "0";
      setTimeout(() => {
        p1.classList.add("hidden");
        p2.classList.remove("hidden");
        p2.classList.add("fade-in");
      }, 400);
    }

    function confirmar() {
      let nome = document.getElementById("nome").value;
      let qtd = document.getElementById("quantidade").value;

      if (nome.trim() === "" || qtd === "") {
        alert("Por favor, preencha seu nome e a quantidade.");
        return;
      }

      const p2 = document.getElementById("pagina2");
      const p3 = document.getElementById("pagina3");

      p2.style.opacity = "0";
      
      setTimeout(() => {
        p2.classList.add("hidden");
        p3.classList.remove("hidden");
        p3.classList.add("fade-in");

        /* Atualizado: JULHO em maiúsculo */
        document.getElementById("mensagemFinal").innerHTML =
          "<strong>" + nome + "</strong>, sua presença foi confirmada para <strong>" + qtd + " pessoa(s)</strong>.<br><br>Aguardamos você no dia 25 de Julho!";
      }, 400);
    }
  </script>

</body>
</html>
